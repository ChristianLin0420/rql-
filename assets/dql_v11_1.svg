<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#111"/></marker>
    <marker id="ahp" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7C4DD6"/></marker>
    <marker id="ahsharp" markerWidth="11" markerHeight="11" refX="6" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#4a238f"/></marker>
    <marker id="ahasc" markerWidth="9" markerHeight="9" refX="5.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1c7a4d"/></marker>
    <marker id="ahrep" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#c0392b"/></marker>
    <radialGradient id="vbg" cx="60%" cy="26%" r="82%">
      <stop offset="0%" stop-color="#C6A9F0"/><stop offset="45%" stop-color="#E6DCF7"/><stop offset="100%" stop-color="#F7F4FD"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1280" height="600" fill="#ffffff"/>
  <text x="640" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#111">DQL v11.1: stronger, stable DRIFT actor &#8212; advantage-weighted drift + damped ascent + eval EMA</text>
  <text x="640" y="57" text-anchor="middle" font-size="13" fill="#555">critic unchanged from v11 (action-sharp Q, rank_acc&#8776;1.0); this fixes the weak + oscillating actor (antmaze 0.30 &#8594; target &#8594; RQL 0.84)</text>

  <!-- key -->
  <line x1="120" y1="80" x2="152" y2="80" stroke="#4a238f" stroke-width="3.5" marker-end="url(#ahsharp)"/><text x="158" y="84" font-size="12" fill="#4a238f">advantage drift</text>
  <line x1="300" y1="80" x2="332" y2="80" stroke="#1c7a4d" stroke-width="2.4" marker-end="url(#ahasc)"/><text x="338" y="84" font-size="12" fill="#1c7a4d">damped Q-ascent</text>
  <line x1="480" y1="80" x2="512" y2="80" stroke="#c0392b" stroke-width="2.2" stroke-dasharray="5 3" marker-end="url(#ahrep)"/><text x="518" y="84" font-size="12" fill="#c0392b">repulsion (multimodal)</text>
  <circle cx="700" cy="80" r="7" fill="#6a3cc0"/><text x="712" y="84" font-size="12" fill="#4a238f">data action (size &#8733; advantage)</text>
  <circle cx="960" cy="80" r="7" fill="#8B5CF6" stroke="#111"/><text x="972" y="84" font-size="12" fill="#241338">generator &#227;</text>

  <!-- ===================== ACTION-SPACE PANEL (drift) ===================== -->
  <rect x="40" y="104" width="640" height="440" rx="20" fill="url(#vbg)" stroke="#111" stroke-width="3"/>
  <text x="360" y="132" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#111">action space: drift toward the argmax-advantage in-support action</text>

  <!-- candidate data actions sized by advantage; the winner is big/dark -->
  <circle cx="470" cy="230" r="20" fill="#5a2ea6" stroke="#2d1258" stroke-width="2.5"/>
  <text x="470" y="200" text-anchor="middle" font-size="12" fill="#2d1258" font-weight="bold">A* (max adv)  w&#8776;0.7</text>
  <circle cx="360" cy="330" r="9" fill="#B79CEE" stroke="#7a63b0" stroke-width="1.4"/><text x="360" y="352" text-anchor="middle" font-size="10.5" fill="#6a3cc0">w&#8776;0.1</text>
  <circle cx="540" cy="360" r="8" fill="#CFC2EC" stroke="#8a76bf" stroke-width="1.2"/><text x="540" y="381" text-anchor="middle" font-size="10.5" fill="#8a76bf">w&#8776;0.05</text>
  <circle cx="300" cy="230" r="7" fill="#CFC2EC" stroke="#8a76bf" stroke-width="1.2"/>
  <circle cx="430" cy="420" r="7" fill="#CFC2EC" stroke="#8a76bf" stroke-width="1.2"/>
  <text x="600" y="222" text-anchor="middle" font-size="11.5" fill="#4a238f">w = softmax((Q&#8722;V)/&#964;)</text>
  <text x="600" y="240" text-anchor="middle" font-size="11.5" fill="#4a238f">peaked (&#964;=0.5)</text>

  <!-- generator samples drift SHARPLY toward A* (not blurred mean); keep two modes via repulsion -->
  <circle cx="210" cy="430" r="13" fill="#8B5CF6" stroke="#111" stroke-width="2.5"/>
  <text x="210" y="434" text-anchor="middle" font-size="11" font-style="italic" fill="#fff">&#227;</text>
  <circle cx="250" cy="360" r="12" fill="#A78BFA" stroke="#111" stroke-width="2"/>
  <path d="M224,424 C320,380 400,300 452,246" fill="none" stroke="#4a238f" stroke-width="5" marker-end="url(#ahsharp)"/>
  <path d="M262,352 C330,320 400,280 452,244" fill="none" stroke="#4a238f" stroke-width="4" marker-end="url(#ahsharp)"/>
  <text x="330" y="410" font-size="12" fill="#4a238f" font-weight="bold">sharp drift &#8594; A*</text>
  <!-- damped Q-ascent (small) -->
  <path d="M470,210 C476,196 484,190 494,184" fill="none" stroke="#1c7a4d" stroke-width="2.4" marker-end="url(#ahasc)"/>
  <text x="516" y="184" font-size="11" fill="#1c7a4d">+ damped ascent (q_coef 0.25)</text>
  <!-- repulsion between gen samples -->
  <path d="M228,420 C238,400 244,384 248,372" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ahrep)"/>
  <text x="196" y="392" text-anchor="end" font-size="10.5" fill="#c0392b">repel</text>

  <text x="360" y="524" text-anchor="middle" font-size="12" fill="#333">v11 blurred the target (kernel-mean) &#8594; weak. v11.1 peaks it on A* &#8594; real improvement, still a drift.</text>

  <!-- ===================== RIGHT: EMA + deploy + badges ===================== -->
  <!-- generator block -->
  <rect x="720" y="150" width="230" height="86" rx="16" fill="#B79CEE" stroke="#111" stroke-width="3"/>
  <text x="835" y="182" text-anchor="middle" font-size="15" font-weight="bold" fill="#1c1030">generator &#960;&#952;</text>
  <text x="835" y="204" text-anchor="middle" font-size="12" fill="#241338">&#949; ~ N(0,I) &#8594; &#227;</text>
  <text x="835" y="222" text-anchor="middle" font-size="11.5" fill="#3a2357">trained by advantage drift + damped ascent</text>

  <!-- EMA -->
  <path d="M835,236 L835,266" fill="none" stroke="#111" stroke-width="2.6" marker-end="url(#ah)"/>
  <text x="848" y="256" font-size="11" fill="#111">EMA 0.005</text>
  <rect x="720" y="268" width="230" height="76" rx="16" fill="#E8E8E8" stroke="#111" stroke-width="3"/>
  <text x="835" y="298" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">EMA generator &#960;&#772;</text>
  <text x="835" y="320" text-anchor="middle" font-size="12" fill="#444">slow average &#8594; stable eval</text>
  <text x="835" y="337" text-anchor="middle" font-size="11" fill="#666">(kills the 0.5&#8596;0.0 eval swing)</text>
  <!-- deploy -->
  <path d="M950,306 L988,306" fill="none" stroke="#111" stroke-width="3" marker-end="url(#ah)"/>
  <rect x="990" y="270" width="150" height="72" rx="16" fill="#E8E8E8" stroke="#111" stroke-width="3"/>
  <text x="1065" y="300" text-anchor="middle" font-size="14" font-weight="bold">deploy</text>
  <text x="1065" y="322" text-anchor="middle" font-size="11.5" fill="#4a238f">medoid of K (from &#960;&#772;)</text>

  <!-- badges -->
  <g>
    <circle cx="722" cy="382" r="14" fill="#7C4DD6" stroke="#111" stroke-width="2"/><text x="722" y="387" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">1</text>
    <text x="744" y="380" font-size="13.5" font-weight="bold" fill="#4a238f">advantage-weighted drift</text>
    <text x="744" y="397" font-size="12" fill="#333">w = softmax((Q&#8722;V)/&#964;), &#964;=0.5 &#8594; drift peaks on argmax-adv action</text>

    <circle cx="722" cy="430" r="14" fill="#7C4DD6" stroke="#111" stroke-width="2"/><text x="722" y="435" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">2</text>
    <text x="744" y="428" font-size="13.5" font-weight="bold" fill="#4a238f">damped Q-ascent</text>
    <text x="744" y="445" font-size="12" fill="#333">q_coef 1.0&#8594;0.25 on lagged target_q &#8594; stable drift dominates</text>

    <circle cx="722" cy="478" r="14" fill="#7C4DD6" stroke="#111" stroke-width="2"/><text x="722" y="483" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">3</text>
    <text x="744" y="476" font-size="13.5" font-weight="bold" fill="#4a238f">eval EMA (RQL's own trick)</text>
    <text x="744" y="493" font-size="12" fill="#333">deploy slow-EMA generator &#8594; removes eval-to-eval swing</text>
  </g>

  <text x="40" y="576" font-size="13" fill="#222">Still <tspan fill="#7C4DD6" font-weight="bold">drift-based</tspan>: the actor is a drift toward data-derived targets &#8212; v11.1 only <tspan font-weight="bold">sharpens the target (advantage)</tspan>, <tspan font-weight="bold">damps the ascent</tspan>, and <tspan font-weight="bold">EMA-smooths deploy</tspan>. Critic identical to v11.</text>
</svg>
